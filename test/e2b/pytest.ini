[pytest]
addopts =
    -ra
    --tb=short
    -v
    --timeout=1800
strict_markers = true
strict_config = true
markers =
    runtime_mtls: sandbox-gateway Runtime mTLS tests requiring dedicated certificates and backend
    flaky: tests with known transient issues (rerun on failure)
    slow: long-running tests
log_cli = false
log_cli_level = WARNING
log_level = DEBUG
log_format = %(asctime)s.%(msecs)03d %(levelname)-8s %(name)s:%(filename)s:%(lineno)d %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
