name: E2E for E2B SDK - latest (MySQL Key Storage)

on:
  push:
    branches:
      - master
      - release-*
  pull_request: { }
  workflow_dispatch: { }

# Declare default permissions as read only.
permissions: read-all


env:
  # Common versions
  GO_VERSION: '1.23'
  KIND_VERSION: 'v0.22.0'
  KIND_IMAGE: 'kindest/node:v1.32.0'
  KIND_CLUSTER_NAME: 'ci-testing'
  CONTROLLER_IMG: agent-sandbox-controller:latest
  MANAGER_IMG: sandbox-manager:latest
  RUNTIME_IMG: agent-runtime:latest
  GATEWAY_IMG: sandbox-gateway:latest
  CODE_INTERPRETER_IMG: registry-ap-southeast-1.ack.aliyuncs.com/acs/code-interpreter:v1.6
  INPLACE_UPDATE_IMG: registry-ap-southeast-1.ack.aliyuncs.com/acs/code-interpreter:v1.6-new
  MYSQL_DATABASE: e2b_keys
  MYSQL_ROOT_PASSWORD: ci-password

jobs:
  sandbox:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: without sandbox-gateway
            with_gateway: false
          - name: with sandbox-gateway
            with_gateway: true
    name: sandbox (${{ matrix.name }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
      - name: Setup Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Setup Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          node_image: ${{ env.KIND_IMAGE }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: ./test/kind-conf.yaml
          version: ${{ env.KIND_VERSION }}

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Cache Docker images
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ env.CODE_INTERPRETER_IMG }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Load cached external images
        run: |
          if [ -f /tmp/docker-images/code-interpreter.tar ]; then
            echo "Using cached code-interpreter image"
            docker load -i /tmp/docker-images/code-interpreter.tar
          else
            echo "Pulling code-interpreter image: ${CODE_INTERPRETER_IMG}"
            docker pull ${CODE_INTERPRETER_IMG}
            mkdir -p /tmp/docker-images
            docker save ${CODE_INTERPRETER_IMG} -o /tmp/docker-images/code-interpreter.tar
            echo "Cached code-interpreter image"
          fi

      - name: Load cached inplace update images
        run: |
          if [ -f /tmp/docker-images/inplace-update.tar ]; then
            echo "Using cached inplace-update image"
            docker load -i /tmp/docker-images/inplace-update.tar
          else
            echo "Building inplace-update image: ${INPLACE_UPDATE_IMG}"
            docker build -t ${INPLACE_UPDATE_IMG} -f test/e2b/assets/Dockerfile .
            mkdir -p /tmp/docker-images
            docker save ${INPLACE_UPDATE_IMG} -o /tmp/docker-images/inplace-update.tar
            echo "Cached inplace-update image"
          fi

      # Flow: build/load images → MySQL → schema → deploy agents with MySQL key storage (no post-deploy patch) → E2E
      # Retry transient GitHub runner resource failures (OOM / disk pressure) during image builds.
      - name: Build and load container images
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 45
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          shell: bash
          on_retry_command: |
            echo "Build and load container images failed; pruning Docker state before retry..."
            docker builder prune -af || true
            docker system prune -f || true
            df -h || true
          command: |
            make docker-build-manager
            make docker-build-controller
            make docker-build-runtime
            kind load docker-image --name=${KIND_CLUSTER_NAME} ${CONTROLLER_IMG} || { echo >&2 "kind not installed or error loading image: ${CONTROLLER_IMG}"; exit 1; }
            docker rmi ${CONTROLLER_IMG}
            kind load docker-image --name=${KIND_CLUSTER_NAME} ${MANAGER_IMG} || { echo >&2 "kind not installed or error loading image: ${MANAGER_IMG}"; exit 1; }
            docker rmi ${MANAGER_IMG}
            kind load docker-image --name=${KIND_CLUSTER_NAME} ${RUNTIME_IMG} || { echo >&2 "kind not installed or error loading image: ${RUNTIME_IMG}"; exit 1; }
            docker rmi ${RUNTIME_IMG}
            kind load docker-image --name=${KIND_CLUSTER_NAME} ${CODE_INTERPRETER_IMG} || { echo >&2 "kind not installed or error loading image: ${CODE_INTERPRETER_IMG}"; exit 1; }
            docker rmi ${CODE_INTERPRETER_IMG}
            kind load docker-image --name=${KIND_CLUSTER_NAME} ${INPLACE_UPDATE_IMG} || { echo >&2 "kind not installed or error loading image: ${INPLACE_UPDATE_IMG}"; exit 1; }
            docker rmi ${INPLACE_UPDATE_IMG}

      - name: Build sandbox-gateway image
        if: matrix.with_gateway
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 60
          retry_on: error
          shell: bash
          on_retry_command: |
            echo "Build sandbox-gateway image failed; pruning Docker state before retry..."
            docker builder prune -af || true
            docker system prune -f || true
            df -h || true
          command: |
            make docker-build-sandbox-gateway
            kind load docker-image --name=${KIND_CLUSTER_NAME} ${GATEWAY_IMG} || { echo >&2 "kind not installed or error loading image: ${GATEWAY_IMG}"; exit 1; }
            docker rmi ${GATEWAY_IMG}

      - name: Deploy MySQL in Kind cluster
        env:
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
        run: bash hack/deploy-mysql-kind-ci.sh

      - name: Initialize MySQL key storage schema
        env:
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_NAMESPACE: sandbox-system
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
        run: |
          kubectl exec -i deployment/mysql -n "${MYSQL_NAMESPACE}" -- \
            env MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mysql --protocol=TCP -h 127.0.0.1 -uroot "${MYSQL_DATABASE}" < hack/mysql-schema.sql
          kubectl exec deployment/mysql -n "${MYSQL_NAMESPACE}" -- \
            env MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mysql --protocol=TCP -h 127.0.0.1 -uroot "${MYSQL_DATABASE}" \
              -e "SELECT table_name FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name IN ('teams', 'team_api_keys') ORDER BY table_name;"

      - name: Install Kruise Agents
        env:
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
        run: |
          MYSQL_DSN="root:${MYSQL_ROOT_PASSWORD}@tcp(mysql.sandbox-system.svc.cluster.local:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local"
          {
            echo ""
            echo "# MySQL key storage, quota Redis, and CI-sized manager requests (appended by e2e-e2b-mysql-latest before deploy)"
            echo "- op: replace"
            echo "  path: /spec/replicas"
            echo "  value: 3"
            echo "- op: add"
            echo "  path: /spec/template/spec/containers/0/args/-"
            echo "  value: --e2b-key-storage=mysql"
            echo "- op: add"
            echo "  path: /spec/template/spec/containers/0/args/-"
            echo "  value: --e2b-key-storage-disable-schema-auto-update"
            echo "- op: add"
            echo "  path: /spec/template/spec/containers/0/args/-"
            echo "  value: --quota-redis-addr=redis.sandbox-system.svc.cluster.local:6379"
            echo "- op: add"
            echo "  path: /spec/template/spec/containers/0/args/-"
            echo "  value: --quota-redis-operation-timeout=1s"
            echo "- op: replace"
            echo "  path: /spec/template/spec/containers/0/resources/requests"
            printf '  value: {"cpu":"100m","memory":"256Mi"}\n'
            echo "- op: replace"
            echo "  path: /spec/template/spec/containers/1/resources/requests"
            printf '  value: {"cpu":"50m","memory":"128Mi"}\n'
            echo "- op: add"
            echo "  path: /spec/template/spec/containers/0/env/-"
            printf '  value: {"name":"E2B_KEY_STORAGE_DSN","value":"%s"}\n' "${MYSQL_DSN}"
            echo "- op: add"
            echo "  path: /spec/template/spec/containers/0/env/-"
            printf '  value: {"name":"E2B_KEY_HASH_PEPPER","value":"%s"}\n' "e2e-test-pepper"
          } >> config/sandbox-manager/configuration_patch.yaml
          echo "deployment patch:"
          cat config/sandbox-manager/configuration_patch.yaml
          make deploy-agent-sandbox-controller
          kubectl rollout status deployment/sandbox-controller-manager -n sandbox-system --timeout=5m
          kubectl apply -f test/e2b/assets/quota-redis.yaml
          kubectl wait --for=condition=available deployment/redis -n sandbox-system --timeout=120s
          make deploy-sandbox-manager

      - name: Deploy sandbox-gateway
        if: matrix.with_gateway
        run: make deploy-sandbox-gateway

      - name: Run E2E Tests
        run: |
          export KUBECONFIG=/home/runner/.kube/config
          export E2B_DOMAIN=localhost
          export E2B_API_KEY=some-api-key
          export INPLACE_UPDATE_IMAGE="${INPLACE_UPDATE_IMG}"
          export QUOTA_E2E_PROFILE=redis
          if [ "${{ matrix.with_gateway }}" = "true" ]; then
            bash hack/run-e2b-e2e-test.sh --with-gateway \
              -m "not gateway_routing and not gateway_uuid_auth and not jwt_auth and not runtime_mtls" \
              --pytest-extra-args "-s -x"
          else
            bash hack/run-e2b-e2e-test.sh --pytest-extra-args "-s -x"
          fi
